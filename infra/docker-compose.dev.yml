version: '3.8'

# 本地开发环境基础设施（PostgreSQL + Redis + MinIO）
# Rust 服务直接在宿主机运行，不在此文件管理
# 启动：docker compose -f infra/docker-compose.dev.yml --env-file .env.example up -d

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: playmate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playmate}
      POSTGRES_DB: playmate
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playmate -d playmate"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-playmate}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-playmate123}
    ports:
      - "0.0.0.0:9000:9000"    # S3 API，图片公开访问需暴露
      - "0.0.0.0:9001:9001"  # 控制台，仅本机访问
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MinIO 初始化（自动建 bucket，运行一次后退出）──────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-playmate}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-playmate123}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/avatars &&
        mc mb --ignore-existing local/market &&
        mc mb --ignore-existing local/topics &&
        mc mb --ignore-existing local/voices &&
        mc anonymous set download local/avatars &&
        mc anonymous set download local/market &&
        mc anonymous set download local/topics &&
        mc anonymous set download local/voices &&
        echo 'MinIO buckets ready.'
      "
    restart: "no"

volumes:
  pg_data:
  redis_data:
  minio_data:
