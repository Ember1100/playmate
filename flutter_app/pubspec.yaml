name: flutter_app
description: 搭伴 - 兴趣社交 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 网络
  dio: ^5.8.0+1

  # 图片/文件选择
  image_picker: ^1.1.2

  # 本地存储
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # UI
  cached_network_image: ^3.4.1

  # WebSocket
  web_socket_channel: ^3.0.0

  # 工具
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
