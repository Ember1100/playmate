name: Deploy to Production

on:
  push:
    branches: [main]

env:
  BINARY_NAME: playmate-gateway
  REMOTE_BIN_PATH: /opt/playmate/bin/playmate-gateway
  REMOTE_MIGRATIONS_PATH: /opt/playmate/migrations

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 检出代码 ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 安装 Rust 工具链 ──────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      # ── 安装交叉编译链接器 ─────────────────────────────────────────────────────
      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gcc-x86-64-linux-gnu

      # ── Cargo 缓存 ─────────────────────────────────────────────────────────────
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 编译 release 二进制 ───────────────────────────────────────────────────
      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: x86_64-linux-gnu-gcc
          SQLX_OFFLINE: "true"
        run: |
          cargo build --release --bin playmate-gateway \
            --target x86_64-unknown-linux-gnu

      # ── 配置 SSH（base64 解码私钥，避免换行符丢失问题）─────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      # ── 上传二进制 ─────────────────────────────────────────────────────────────
      - name: Upload binary
        run: |
          scp -i ~/.ssh/deploy_key \
            target/x86_64-unknown-linux-gnu/release/playmate-gateway \
            root@${{ secrets.SERVER_HOST }}:${REMOTE_BIN_PATH}.new

      # ── 上传迁移文件 ───────────────────────────────────────────────────────────
      - name: Upload migrations
        run: |
          scp -i ~/.ssh/deploy_key -r infra/migrations/* \
            root@${{ secrets.SERVER_HOST }}:${REMOTE_MIGRATIONS_PATH}/

      # ── 远程执行：迁移 → 热替换 → 重启 → 健康检查 ────────────────────────────
      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            # 加载环境变量
            set -a
            source /opt/playmate/.env.prod
            set +a

            # 运行数据库迁移
            echo ">>> Running migrations..."
            sqlx migrate run \
              --source /opt/playmate/migrations \
              --database-url "$DATABASE_URL"

            # 原子替换二进制
            echo ">>> Replacing binary..."
            chmod +x /opt/playmate/bin/playmate-gateway.new
            mv /opt/playmate/bin/playmate-gateway.new /opt/playmate/bin/playmate-gateway

            # 重启服务
            echo ">>> Restarting service..."
            systemctl restart playmate

            # 等待服务就绪（最多 30 秒）
            echo ">>> Waiting for service to become healthy..."
            for i in $(seq 1 10); do
              sleep 3
              STATUS=$(curl -fsS http://localhost:8080/health 2>/dev/null \
                | grep -o '"status":"[^"]*"' | head -1 || echo "")
              if echo "$STATUS" | grep -q '"status":"ok"'; then
                echo ">>> Service is healthy!"
                exit 0
              fi
              echo "    Attempt $i/10: not ready yet..."
            done

            echo ">>> ERROR: Service did not become healthy in time"
            journalctl -u playmate -n 50 --no-pager
            exit 1
          EOF

      # ── 清理密钥 ──────────────────────────────────────────────────────────────
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
